<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SII Agent — Financial Advisory Demo</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d2991d;
    --user-bg: #1f6feb22;
    --assistant-bg: #161b22;
    --tool-bg: #0d1117;
    --tool-border: #21262d;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  header .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
  }
  header .status .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  }
  header .status .dot.offline { background: var(--red); }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Messages */
  .msg {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user .content {
    background: rgba(31,111,235,0.12);
    border: 1px solid rgba(31,111,235,0.2);
    border-radius: 12px;
    padding: 10px 14px;
  }
  .msg.assistant .content {
    background: transparent;
    padding: 10px 0;
  }

  .msg .role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    color: var(--text-muted);
  }
  .msg.user .role { color: var(--accent); }
  .msg.assistant .role { color: var(--green); }

  .msg .text {
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.assistant .text.streaming::after {
    content: "▊";
    animation: blink 0.8s infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Tool call block */
  .tool-call {
    margin: 8px 0;
    border: 1px solid var(--tool-border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--tool-bg);
  }
  .tool-call .tool-header {
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--yellow);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .tool-call .tool-header:hover { background: rgba(255,255,255,0.03); }
  .tool-call .tool-header .icon { font-size: 14px; }
  .tool-call .tool-header .name { font-weight: 600; }
  .tool-call .tool-header .status {
    margin-left: auto;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .tool-call .tool-header .status.running { background: rgba(210,153,29,0.15); color: var(--yellow); }
  .tool-call .tool-header .status.done { background: rgba(63,185,80,0.15); color: var(--green); }
  .tool-call .tool-header .status.error { background: rgba(248,81,73,0.15); color: var(--red); }

  .tool-call .tool-detail {
    padding: 0 12px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    max-height: 200px;
    overflow-y: auto;
    display: none;
    background: rgba(0,0,0,0.2);
    white-space: pre-wrap;
    border-top: 1px solid var(--tool-border);
  }
  .tool-call.expanded .tool-detail { display: block; }

  .tool-call .tool-input {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 12px;
    border-top: 1px solid var(--tool-border);
    background: rgba(0,0,0,0.15);
  }

  /* Input area */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    flex-shrink: 0;
  }
  #input-area {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #input-area textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.4;
  }
  #input-area textarea:focus { border-color: var(--accent); }
  #input-area textarea::placeholder { color: var(--text-muted); }

  #input-area button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  #input-area button:hover { opacity: 0.85; }
  #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing-indicator {
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 0;
  }
  .typing-indicator::after {
    content: "";
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .welcome p { font-size: 14px; line-height: 1.6; }
  .welcome .examples {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 20px;
  }
  .welcome .examples button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .welcome .examples button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1><span>▸</span> SII Agent — Securities Industry Operations</h1>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>SII Financial Advisory Agent</h2>
    <p>I can look up clients, review portfolios, place trades, check CRM history,<br>and manage financial plans across 7 simulated brokerage subsystems.</p>
    <div class="examples">
      <button onclick="sendQuick('Who are my latest clients?')">Latest clients</button>
      <button onclick="sendQuick('Review Robert Chen\'s portfolio')">Portfolio review</button>
      <button onclick="sendQuick('Show me all pending orders')">Pending orders</button>
      <button onclick="sendQuick('What plans does Marcus Williams have active?')">Financial plans</button>
      <button onclick="sendQuick('Place a limit buy for 50 shares of NVDA for client ACC-10009 at $135')">Place trade</button>
      <button onclick="sendQuick('Add a new client named Alex Rivera, individual account, aggressive growth')">Add client</button>
    </div>
  </div>
</div>

<footer>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Ask the SII agent anything..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</footer>

<script>
let ws;
let connected = false;
let currentMessageId = null;
let currentTextDiv = null;
let currentToolDiv = null;
let processing = false;

function setStatus(online, text) {
  document.getElementById('status-dot').className = 'dot' + (online ? '' : ' offline');
  document.getElementById('status-text').textContent = text;
}

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onopen = () => {
    connected = true;
    setStatus(true, 'Connected');
    ws.send(JSON.stringify({ type: 'init' }));
  };

  ws.onclose = () => {
    connected = false;
    setStatus(false, 'Disconnected');
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  };

  ws.onerror = () => setStatus(false, 'Error');
}

function handleEvent(event) {
  switch (event.type) {
    case 'ready':
      setStatus(true, 'Ready');
      break;

    case 'message_start':
      if (event.role === 'assistant') {
        // New assistant message — create message block
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'msg assistant';
        div.id = 'msg-' + event.messageId;

        const role = document.createElement('div');
        role.className = 'role';
        role.textContent = 'SII Agent';

        currentTextDiv = document.createElement('div');
        currentTextDiv.className = 'text streaming';

        div.appendChild(role);
        div.appendChild(currentTextDiv);
        chat.appendChild(div);
        currentMessageId = event.messageId;
        document.getElementById('welcome')?.remove();
        scrollDown();
      } else if (event.role === 'user') {
        // User message already shown by prompt handler
      }
      break;

    case 'message_delta':
      if (currentTextDiv && event.delta) {
        currentTextDiv.textContent += event.delta;
        scrollDown();
      }
      break;

    case 'message_end':
      if (currentTextDiv && event.role === 'assistant') {
        currentTextDiv.classList.remove('streaming');

        // Add tool calls
        if (event.toolCalls) {
          for (const tc of event.toolCalls) {
            addToolCall(tc, null, 'done');
          }
        }
        if (event.toolResults) {
          for (const tr of event.toolResults) {
            // Tool results update the existing tool call block
          }
        }

        // Add tool calls that came directly
        if (event.toolCalls) {
          for (const tc of event.toolCalls) {
            addToolCall(tc, null, 'done');
          }
        }

        currentTextDiv = null;
        currentMessageId = null;
        scrollDown();
      }
      break;

    case 'agent_end':
      processing = false;
      updateSendButton();
      if (event.error) {
        addSystemMessage('Error: ' + event.error);
      }
      break;

    case 'done':
      processing = false;
      updateSendButton();
      break;

    case 'error':
      addSystemMessage('Error: ' + event.error);
      processing = false;
      updateSendButton();
      break;
  }
}

function addToolCall(toolCall) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `
    <div class="role">TOOL</div>
    <div class="tool-call expanded">
      <div class="tool-header" onclick="this.parentElement.classList.toggle('expanded')">
        <span class="icon">▶</span>
        <span class="name">${escapeHtml(toolCall.name)}</span>
        <span class="status running">running</span>
      </div>
      <div class="tool-input">${formatToolInput(toolCall.input)}</div>
      <div class="tool-detail"></div>
    </div>
  `;
  chat.appendChild(div);
  scrollDown();
  return div;
}

function formatToolInput(input) {
  if (!input) return '';
  const lines = [];
  for (const [k, v] of Object.entries(input)) {
    lines.push(`  ${k}: ${v}`);
  }
  return lines.join('\n');
}

function addSystemMessage(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="role">SYSTEM</div><div class="text" style="color:var(--text-muted);font-size:12px;">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  scrollDown();
}

function addUserMessage(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="role">You</div><div class="text">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  document.getElementById('welcome')?.remove();
  scrollDown();
}

function send() {
  if (!connected || processing) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  processing = true;
  updateSendButton();
  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';

  ws.send(JSON.stringify({ type: 'prompt', text }));
}

function sendQuick(text) {
  if (!connected || processing) return;
  processing = true;
  updateSendButton();
  addUserMessage(text);
  ws.send(JSON.stringify({ type: 'prompt', text }));
}

function updateSendButton() {
  const btn = document.getElementById('send-btn');
  btn.disabled = processing || !connected;
  btn.textContent = processing ? '...' : 'Send';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function scrollDown() {
  const chat = document.getElementById('chat');
  requestAnimationFrame(() => chat.scrollTop = chat.scrollHeight);
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Connect on load
connect();
</script>
</body>
</html>
